<!-- Render standard page header and footer elements -->
{% extends 'base.html' %}

<!-- Inject account creation module into central body area -->
{% block content %}
<div class="form-container">
    <div class="auth-header">
        <h2>Create account</h2>
    </div>
    <!-- Register form sends submitted credential POST data to the /register python route -->
    <form method="POST" action="">
        <div class="form-group">
            <label for="username">Your name</label>
            <!-- Form field linked to 'name="username"' attribute inside the route request.form handler -->
            <input type="text" id="username" name="username" class="form-control" placeholder="First and last name"
                required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <!-- Email fields validate basic formatting requirements directly in the browser -->
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <!-- Enforce a baseline minimal password safety threshold (6 characters) -->
            <input type="password" id="password" name="password" class="form-control"
                placeholder="At least 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create your goodStore account</button>
    </form>

    <!-- Link redirecting users who already possess an account over to the standard login page -->
    <div style="margin-top: 20px; font-size: 0.9rem;">
        <p>Already have an account? <a href="{{ url_for('main.login') }}"
                style="color: #007185; text-decoration: none;">Sign in</a></p>
    </div>
</div>
{% endblock %}
