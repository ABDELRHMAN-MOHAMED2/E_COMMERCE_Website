<!-- Load global layout -->
{% extends 'base.html' %}

<!-- Inject login form into layout body -->
{% block content %}
<!-- Centered container for authentication forms defined in CSS -->
<div class="form-container">
    <div class="auth-header">
        <h2>Sign in</h2>
    </div>
    <!-- Login form submitting POST data back to the same current Route URL (/login) -->
    <form method="POST" action="">
        <div class="form-group">
            <label for="email">Email</label>
            <!-- Input matched to form processing via the 'name' attribute -->
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <!-- Passwords remain obscured using type="password" -->
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <!-- Link redirecting first-time users over to the registration route -->
    <div style="margin-top: 20px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">New to goodStore?</p>
        <a href="{{ url_for('main.register') }}" class="btn"
            style="display: block; width: 100%; box-sizing: border-box; background-color: #e7e9ec; border: 1px solid #adb1b8; color: #111;">Create
            your goodStore account</a>
    </div>
</div>
{% endblock %}
